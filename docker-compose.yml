services:
  backend:
    build:
      context: ./backend
    container_name: deceptgrid-api
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    volumes:
      - ./certs:/app/certs:ro
    ports:
      - "8000:8000"
    networks:
      - grid-net
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --ssl-keyfile /app/certs/server.key --ssl-certfile /app/certs/server.crt --ssl-ca-certs /app/certs/ca.crt --ssl-cert-reqs 2

  gateway:
    build:
      context: ./backend
    container_name: deceptgrid-gateway
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - OTP_EXPIRY_SECONDS=300
      - ISOLATION_THRESHOLD=3
    ports:
      - "8001:8001"
    networks:
      - grid-net
    command: uvicorn gateway:gateway --host 0.0.0.0 --port 8001

networks:
  grid-net:
    driver: bridge
