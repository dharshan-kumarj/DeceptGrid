server {
    listen 8443 ssl;
    server_name localhost;

    ssl_certificate /home/dharshan/projects/DeceptGrid/certs/server.crt;
    ssl_certificate_key /home/dharshan/projects/DeceptGrid/certs/server.key;

    # Request client certificate
    ssl_client_certificate /home/dharshan/projects/DeceptGrid/certs/ca.crt;
    ssl_verify_client optional;
    ssl_verify_depth 2;

    # Pass the client certificate to the backend
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Client-Cert $ssl_client_cert;
        proxy_set_header X-Client-Verify $ssl_client_verify;
        proxy_set_header X-Client-Subject $ssl_client_s_dn;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 8000;
    server_name localhost;

    location / {
        proxy_pass http://127.0.0.1:8001;
    }
}
